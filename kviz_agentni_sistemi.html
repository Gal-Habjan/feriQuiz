<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kviz — Agentni sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #6c8eff;
    --accent2: #ff6b6b;
    --accent3: #43e97b;
    --accent4: #f9ca24;
    --text: #e8eaf0;
    --text-dim: #7a8099;
    --text-muted: #4a5068;
    --correct: #1a3a28;
    --correct-border: #43e97b;
    --wrong: #3a1a1a;
    --wrong-border: #ff6b6b;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── SPLASH ─────────────────────────────────── */
  #splash {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    background: radial-gradient(ellipse at 30% 20%, #1a1f35 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, #0f1a28 0%, transparent 60%),
                var(--bg);
    position: relative;
    overflow: hidden;
  }
  #splash::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(108,142,255,0.06) 0%, transparent 40%),
      radial-gradient(circle at 80% 20%, rgba(67,233,123,0.04) 0%, transparent 30%);
    pointer-events: none;
  }
  .splash-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.8;
    margin-bottom: 24px;
  }
  .splash-title {
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff 0%, #6c8eff 50%, #43e97b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .splash-sub {
    font-size: 16px;
    color: var(--text-dim);
    max-width: 500px;
    line-height: 1.6;
    margin-bottom: 48px;
  }
  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    max-width: 860px;
    width: 100%;
    margin-bottom: 40px;
  }
  .ch-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .ch-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-accent, var(--accent));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .ch-card:hover { border-color: var(--card-accent, var(--accent)); transform: translateY(-2px); }
  .ch-card:hover::before { opacity: 1; }
  .ch-card .ch-num {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--card-accent, var(--accent));
    letter-spacing: 2px;
    margin-bottom: 6px;
    opacity: 0.8;
  }
  .ch-card .ch-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .ch-card .ch-count { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-family: 'Space Mono', monospace; }
  .btn-all {
    background: linear-gradient(135deg, var(--accent), #8b6fff);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 14px 36px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(108,142,255,0.3);
  }
  .btn-all:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(108,142,255,0.4); }

  /* ── QUIZ ────────────────────────────────────── */
  #quiz { display: none; min-height: 100vh; }

  .quiz-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .quiz-title-bar { flex: 1; }
  .quiz-chapter-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .quiz-progress-text { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .progress-bar-wrap { width: 160px; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #8b6fff); border-radius: 4px; transition: width 0.4s; }
  .score-display {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent3);
    white-space: nowrap;
  }

  .quiz-body { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

  .q-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin: 0 auto 24px;
    max-width: 660px;
    transition: max-width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    animation: slideInLeft 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .q-block.answered {
    max-width: 1200px;
  }
  @keyframes fadeIn    { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInLeft { from { opacity: 0; transform: translateX(-28px); } to { opacity: 1; transform: translateX(0); } }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .q-number {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: rgba(108,142,255,0.1);
    border: 1px solid rgba(108,142,255,0.25);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .q-status { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
  .q-status.correct { background: var(--accent3); box-shadow: 0 0 8px rgba(67,233,123,0.5); }
  .q-status.wrong { background: var(--accent2); box-shadow: 0 0 8px rgba(255,107,107,0.5); }

  .q-text {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.55;
    margin-bottom: 24px;
    color: var(--text);
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    text-align: left;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text);
    transition: all 0.18s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    line-height: 1.45;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,142,255,0.06); }
  .opt-btn .opt-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 2px;
    width: 18px;
  }
  .opt-btn.correct-choice {
    background: var(--correct);
    border-color: var(--correct-border);
    color: #e0ffe8;
  }
  .opt-btn.correct-choice .opt-label { color: var(--correct-border); }
  .opt-btn.wrong-choice {
    background: var(--wrong);
    border-color: var(--wrong-border);
    color: #ffe0e0;
  }
  .opt-btn.wrong-choice .opt-label { color: var(--accent2); }
  .opt-btn.reveal-correct {
    background: rgba(67,233,123,0.06);
    border-color: rgba(67,233,123,0.4);
  }
  .opt-btn:disabled { cursor: default; }

  .explanation {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 13.5px;
    line-height: 1.65;
    display: none;
    animation: fadeIn 0.25s ease;
  }
  .explanation.correct-exp {
    background: rgba(67,233,123,0.07);
    border-left: 3px solid var(--accent3);
    color: #b0e8c0;
  }
  .explanation.wrong-exp {
    background: rgba(255,107,107,0.07);
    border-left: 3px solid var(--accent2);
    color: #f0c0c0;
  }
  .explanation strong { color: var(--text); }

  /* ── RESULTS ────────────────────────────────── */
  #results {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
    flex-direction: column;
  }
  .result-ring {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0deg, var(--accent) var(--ring-deg, 0deg), var(--border) var(--ring-deg, 0deg));
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    position: relative;
  }
  .result-ring::after {
    content: '';
    position: absolute;
    width: 128px;
    height: 128px;
    border-radius: 50%;
    background: var(--bg);
  }
  .result-pct {
    position: relative;
    z-index: 1;
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
  }
  .result-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .result-sub { color: var(--text-dim); font-size: 15px; margin-bottom: 40px; }
  .result-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn-retry, .btn-home {
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-retry {
    background: var(--accent);
    color: #fff;
    border: none;
    box-shadow: 0 4px 20px rgba(108,142,255,0.35);
  }
  .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(108,142,255,0.45); }
  .btn-home {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-home:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 700px) {
    .quiz-header { padding: 12px 16px; gap: 12px; }
    .progress-bar-wrap { width: 80px; }
    .quiz-body { padding: 24px 16px; }
    .q-block { padding: 20px; }
    .q-text { font-size: 15px; }
    /* mobile: stack vertically, revert split */
    .q-inner { flex-direction: column; overflow: visible; }
    .q-left  { flex: 0 0 100% !important; max-width: 100% !important; }
    .q-right {
      flex: 0 0 auto !important;
      opacity: 1 !important;
      transform: none !important;
      padding-left: 0 !important;
      border-left: none !important;
      overflow: visible !important;
      transition: none !important;
    }
    /* on mobile, use slide-down reveal via .visible class */
    .q-right .all-explanations { display: none; margin-top: 16px; }
    .q-right .all-explanations.visible { display: flex; }
    .q-right .opt-explanation { animation: slideDown 0.3s ease both; }
    .q-right .opt-explanation:nth-child(1) { animation-delay: 0.04s; }
    .q-right .opt-explanation:nth-child(2) { animation-delay: 0.09s; }
    .q-right .opt-explanation:nth-child(3) { animation-delay: 0.14s; }
    .q-right .opt-explanation:nth-child(4) { animation-delay: 0.19s; }
  }

  /* ── SPLIT LAYOUT ───────────────────────────── */
  .q-inner {
    display: flex;
    align-items: flex-start;
    overflow: hidden;
  }
  /* q-left: fixed comfortable width — never shrinks */
  .q-left {
    flex: 0 0 580px;
    max-width: 100%;
    min-width: 0;
    transform: translateX(0);
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .q-block.answered .q-left {
    /* slight leftward pull as the right panel opens */
    animation: nudgeLeft 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes nudgeLeft {
    0%   { transform: translateX(0); }
    35%  { transform: translateX(-10px); }
    100% { transform: translateX(0); }
  }
  /* q-right: expands from 0 to full remaining space */
  .q-right {
    flex: 0 0 0px;
    min-width: 0;
    overflow: hidden;
    opacity: 0;
    transform: translateX(28px);
    padding-left: 0;
    transition:
      flex-basis 0.48s cubic-bezier(0.22, 1, 0.36, 1),
      opacity 0.35s ease 0.2s,
      transform 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.05s,
      padding-left 0.48s cubic-bezier(0.22, 1, 0.36, 1),
      border-color 0.3s ease 0.35s;
    border-left: 1px solid transparent;
  }
  .q-block.answered .q-right {
    flex: 1 0 360px;   /* grows to fill all space left of q-left */
    opacity: 1;
    transform: translateX(0);
    padding-left: 28px;
    border-left-color: var(--border);
  }
  /* right panel: always show explanations (parent controls visibility) */
  .q-right .all-explanations {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 0;
  }
  /* right panel items: fade in (no Y slide — the panel itself does the movement) */
  .q-right .opt-explanation { animation: fadeInSimple 0.25s ease both; }
  .q-right .opt-explanation:nth-child(1) { animation-delay: 0.30s; }
  .q-right .opt-explanation:nth-child(2) { animation-delay: 0.37s; }
  .q-right .opt-explanation:nth-child(3) { animation-delay: 0.44s; }
  .q-right .opt-explanation:nth-child(4) { animation-delay: 0.51s; }
  @keyframes fadeInSimple { from { opacity: 0; } to { opacity: 1; } }

  /* ── ALL-OPTION EXPLANATIONS ─────────────────── */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .all-explanations {
    margin-top: 20px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .all-explanations.visible { display: flex; }
  .opt-explanation {
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 13px;
    line-height: 1.55;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: slideDown 0.3s ease both;
  }
  .opt-explanation:nth-child(1) { animation-delay: 0.04s; }
  .opt-explanation:nth-child(2) { animation-delay: 0.09s; }
  .opt-explanation:nth-child(3) { animation-delay: 0.14s; }
  .opt-explanation:nth-child(4) { animation-delay: 0.19s; }
  .opt-explanation.correct-opt {
    background: rgba(67,233,123,0.08);
    border-left: 3px solid var(--accent3);
  }
  .opt-explanation.wrong-opt {
    background: rgba(255,107,107,0.05);
    border-left: 3px solid rgba(255,107,107,0.3);
  }
  .opt-explanation.wrong-opt.chosen {
    background: rgba(255,107,107,0.11);
    border-left-color: var(--accent2);
  }
  .opt-exp-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
    width: 14px;
  }
  .correct-opt .opt-exp-label { color: var(--accent3); }
  .wrong-opt .opt-exp-label { color: var(--accent2); opacity: 0.55; }
  .wrong-opt.chosen .opt-exp-label { opacity: 1; }
  .opt-exp-content { flex: 1; }
  .opt-exp-verdict {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4px;
    margin-bottom: 3px;
  }
  .correct-opt .opt-exp-verdict { color: var(--accent3); }
  .wrong-opt .opt-exp-verdict { color: rgba(255,107,107,0.6); }
  .wrong-opt.chosen .opt-exp-verdict { color: var(--accent2); }
  .opt-exp-reason { font-size: 12.5px; line-height: 1.55; }
  .correct-opt .opt-exp-reason { color: #a8e0b8; }
  .wrong-opt .opt-exp-reason { color: #b09090; }
  .wrong-opt.chosen .opt-exp-reason { color: #e0b0b0; }

  /* ── INFO BUTTON ─────────────────────────────── */
  .info-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 3px 9px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    display: none;
    align-items: center;
    gap: 4px;
  }
  .info-btn.visible { display: inline-flex; }
  .info-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── PDF MODAL ───────────────────────────────── */
  .pdf-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .pdf-modal.open { display: flex; }
  .pdf-modal-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: min(92vw, 940px);
    height: 82vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pdf-modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .pdf-modal-meta {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    flex: 1;
  }
  .pdf-page-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .pdf-page-chip {
    background: rgba(108,142,255,0.1);
    border: 1px solid rgba(108,142,255,0.3);
    color: var(--accent);
    padding: 2px 10px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pdf-page-chip:hover, .pdf-page-chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .pdf-close-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .pdf-close-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .pdf-frame-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .pdf-frame-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .pdf-no-pages {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.8;
  }

  /* ── MODE TOGGLE ─────────────────────────────── */
  .mode-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }
  .mode-btn {
    flex: 1;
    padding: 10px 20px;
    border: none;
    border-radius: 7px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: none;
    color: var(--text-dim);
  }
  .mode-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 12px rgba(108,142,255,0.35);
  }
  .mode-btn:hover:not(.active) { color: var(--text); }

  /* ── OPEN ENDED QUESTIONS ────────────────────── */
  .btn-reveal {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 24px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
    display: inline-block;
  }
  .btn-reveal:hover { border-color: var(--accent); color: var(--accent); }
  .open-answer-wrap { animation: fadeIn 0.3s ease; }
  .open-answer-box {
    margin-top: 18px;
    padding: 16px 20px;
    background: rgba(108,142,255,0.06);
    border: 1px solid rgba(108,142,255,0.2);

    },
    {

      pages: [184]

// ── STATE ─────────────────────────────────────────────
let currentMode = 'mcq'; // 'mcq' or 'open'
let activeChapters = [];
let flatQuestions = [];
let answers = {}; // index → { chosen, correct } for MCQ | { revealed, correct } for open
let currentChapterId = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildFlat(chapters, limit) {
  const flat = [];
  chapters.forEach(ch => {
    const shuffledQs = shuffle(ch.questions);
    shuffledQs.forEach(q => {
      const indexed = q.opts.map((o, i) => ({ text: o[0], correct: o[1], explanation: o[2] }));
      flat.push({ ...q, opts: shuffle(indexed), chapterName: ch.name, chapterColor: ch.color, pages: q.pages || [] });
    });
  });
  if (limit && limit < flat.length) return shuffle(flat).slice(0, limit);
  return flat;
}

// ── SPLASH INIT ───────────────────────────────────────
function initSplash() {
  const chapters = currentMode === 'open' ? RAW_OPEN_CHAPTERS : RAW_CHAPTERS;
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';
  chapters.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'ch-card';
    card.style.setProperty('--card-accent', ch.color);
    card.innerHTML = `
      <div class="ch-num">POGLAVJE ${String(i+1).padStart(2,'0')}</div>
      <div class="ch-name">${ch.name}</div>
      <div class="ch-count">${ch.questions.length} vprašanj</div>`;
    card.onclick = () => startQuiz(ch.id);
    grid.appendChild(card);
  });
  const btnAll = document.getElementById('btnAll');
  if (btnAll) {
    btnAll.textContent = currentMode === 'open'
      ? '▶ Reši vse skupaj (20 naključnih)'
      : '▶ Reši vse skupaj (40 naključnih)';
  }
}

function startQuiz(chId) {
  currentChapterId = chId;
  answers = {};
  if (currentMode === 'open') {
    const src = chId === 'all' ? RAW_OPEN_CHAPTERS : RAW_OPEN_CHAPTERS.filter(c => c.id === chId);
    activeChapters = src;
    flatQuestions = buildOpenFlat(src, chId === 'all' ? 20 : null);
    document.getElementById('splash').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    renderOpenQuiz();
    return;
  }
  if (chId === 'all') {
    activeChapters = RAW_CHAPTERS;
  } else {
    activeChapters = RAW_CHAPTERS.filter(c => c.id === chId);
  }
  flatQuestions = buildFlat(activeChapters, chId === 'all' ? 40 : null);
  document.getElementById('splash').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuiz();
}

function goHome() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('splash').style.display = 'flex';
}

// ── RENDER QUIZ ───────────────────────────────────────
function renderQuiz() {
  const total = flatQuestions.length;
  const answered = Object.keys(answers).length;
  const correct = Object.values(answers).filter(a => a.correct).length;

  const chName = currentChapterId === 'all' ? 'Vse skupaj' : activeChapters[0]?.name || '';
  document.getElementById('quizChapterName').textContent = chName;
  document.getElementById('quizProgressText').textContent = `${answered} / ${total} odgovorjenih`;
  document.getElementById('progressFill').style.width = `${(answered/total)*100}%`;
  document.getElementById('scoreDisplay').textContent = `✓ ${correct} / ${answered}`;

  const body = document.getElementById('quizBody');
  body.innerHTML = '';

  flatQuestions.forEach((q, qi) => {
    const ans = answers[qi];
    const block = document.createElement('div');
    block.className = 'q-block';
    block.id = `q${qi}`;

    const statusClass = ans ? (ans.correct ? 'correct' : 'wrong') : '';
    if (ans) block.classList.add('answered');
    block.innerHTML = `
      <div class="q-inner">
        <div class="q-left">
          <div class="q-meta">
            <span class="q-number"># ${String(qi+1).padStart(2,'0')}</span>
            <span style="font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace;flex:1">${q.chapterName}</span>
            <button class="info-btn ${ans ? 'visible' : ''}" id="infobtn${qi}" onclick="openPdfModal(${qi})">ℹ vir</button>
            <span class="q-status ${statusClass}"></span>
          </div>
          <div class="q-text">${q.q}</div>
          <div class="options" id="opts${qi}"></div>
        </div>
        <div class="q-right">
          <div class="all-explanations" id="allExp${qi}"></div>
        </div>
      </div>`;

    body.appendChild(block);

    const optsDiv = block.querySelector(`#opts${qi}`);
    q.opts.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.disabled = !!ans;
      btn.innerHTML = `<span class="opt-label">${LABELS[oi]}</span><span>${opt.text}</span>`;

      if (ans) {
        if (opt.correct) btn.classList.add(ans ? 'reveal-correct' : '');
        if (oi === ans.chosenIdx && !opt.correct) btn.classList.add('wrong-choice');
        if (oi === ans.chosenIdx && opt.correct) btn.classList.remove('reveal-correct'), btn.classList.add('correct-choice');
        if (opt.correct && oi !== ans.chosenIdx) btn.classList.add('reveal-correct');
      }

      btn.onclick = () => handleAnswer(qi, oi);
      optsDiv.appendChild(btn);
    });

    if (ans) showExplanation(qi, ans.chosenIdx);
  });
}

function handleAnswer(qi, chosenIdx) {
  if (answers[qi]) return;
  const q = flatQuestions[qi];
  const correct = q.opts[chosenIdx].correct;
  answers[qi] = { chosenIdx, correct };

  // Update buttons
  const optsDiv = document.getElementById(`opts${qi}`);
  const btns = optsDiv.querySelectorAll('.opt-btn');
  btns.forEach((btn, oi) => {
    btn.disabled = true;
    if (q.opts[oi].correct && oi === chosenIdx) btn.classList.add('correct-choice');
    else if (!q.opts[oi].correct && oi === chosenIdx) btn.classList.add('wrong-choice');
    else if (q.opts[oi].correct) btn.classList.add('reveal-correct');
  });

  // Update status dot
  const dot = document.querySelector(`#q${qi} .q-status`);
  if (dot) dot.classList.add(correct ? 'correct' : 'wrong');

  showExplanation(qi, chosenIdx);
  const infoBtn = document.getElementById(`infobtn${qi}`);
  if (infoBtn) infoBtn.classList.add('visible');
  updateHeader();

  // Check if done
  if (Object.keys(answers).length === flatQuestions.length) {
    setTimeout(showResults, 600);
  }
}

function showExplanation(qi, chosenIdx) {
  const q = flatQuestions[qi];
  const ans = answers[qi];
  const container = document.getElementById(`allExp${qi}`);
  if (!container || !ans) return;

  container.innerHTML = q.opts.map((opt, oi) => {
    const isChosen = oi === chosenIdx;
    const isCorrect = opt.correct;
    let cls = isCorrect ? 'correct-opt' : 'wrong-opt';
    if (isChosen && !isCorrect) cls += ' chosen';
    const verdict = isCorrect
      ? ('✓ PRAVILNO' + (isChosen ? ' ← tvoj odgovor' : ''))
      : ('✗ NAPAČNO'  + (isChosen ? ' ← tvoj odgovor' : ''));
    return `<div class="opt-explanation ${cls}">
      <span class="opt-exp-label">${LABELS[oi]}</span>
      <div class="opt-exp-content">
        <div class="opt-exp-verdict">${verdict}</div>
        <div class="opt-exp-reason">${opt.explanation}</div>
      </div>
    </div>`;
  }).join('');

  container.classList.add('visible');
  document.getElementById(`q${qi}`)?.classList.add('answered');
}

function updateHeader() {
  const total = flatQuestions.length;
  const answered = Object.keys(answers).length;
  const correct = Object.values(answers).filter(a => a.correct).length;
  document.getElementById('quizProgressText').textContent = `${answered} / ${total} odgovorjenih`;
  document.getElementById('progressFill').style.width = `${(answered/total)*100}%`;
  document.getElementById('scoreDisplay').textContent = `✓ ${correct} / ${answered}`;
}

// ── RESULTS ───────────────────────────────────────────
function showResults() {
  document.getElementById('quiz').style.display = 'none';
  const res = document.getElementById('results');
  res.style.display = 'flex';

  const total = flatQuestions.length;
  const correct = currentMode === 'open'
    ? Object.values(answers).filter(a => a.correct === true).length
    : Object.values(answers).filter(a => a.correct).length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('resultPct').textContent = pct + '%';
  document.getElementById('resultRing').style.setProperty('--ring-deg', `${pct * 3.6}deg`);

  let title, sub;
  if (pct >= 90) { title = '🏆 Odlično!'; sub = `${correct} / ${total} pravilnih — odlično znanje agentnih sistemov!`; }
  else if (pct >= 70) { title = '👍 Dobro!'; sub = `${correct} / ${total} pravilnih — dobra osnova, ponovite šibke točke.`; }
  else if (pct >= 50) { title = '📚 Ni slabo'; sub = `${correct} / ${total} pravilnih — snov je vredna ponovitve.`; }
  else { title = '💪 Naprej!'; sub = `${correct} / ${total} pravilnih — preučite gradivo in poskusite znova.`; }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;

  document.getElementById('retryBtn').onclick = () => startQuiz(currentChapterId);
}

// ── PDF MODAL ─────────────────────────────────────────
function openPdfModal(qi) {
  const q = flatQuestions[qi];
  const pages = q.pages || [];
  const modal = document.getElementById('pdfModal');
  const label = document.getElementById('pdfPageLabel');
  const chips = document.getElementById('pdfPageChips');
  const wrap  = document.getElementById('pdfFrameWrap');

  chips.innerHTML = '';

  if (pages.length === 0) {
    label.textContent = '';
    wrap.innerHTML = `<div class="pdf-no-pages">Strani za to vprašanje niso nastavljene.<br>Dodajte polje <code>pages: [n]</code> v podatke vprašanja.</div>`;
  } else {
    wrap.innerHTML = '<iframe id="pdfFrame" src=""></iframe>';
    const frame = document.getElementById('pdfFrame');
    const loadPage = (p) => {
      frame.src = `powerpoints/main.pdf#page=${p}`;
      label.textContent = `· stran ${p}`;
      chips.querySelectorAll('.pdf-page-chip').forEach(c => c.classList.remove('active'));
      chips.querySelector(`[data-page="${p}"]`)?.classList.add('active');
    };
    pages.forEach((p, i) => {
      const chip = document.createElement('button');
      chip.className = 'pdf-page-chip' + (i === 0 ? ' active' : '');
      chip.dataset.page = p;
      chip.textContent = `str. ${p}`;
      chip.onclick = () => loadPage(p);
      chips.appendChild(chip);
    });
    loadPage(pages[0]);
  }

  modal.classList.add('open');
}

function closePdfModal() {
  document.getElementById('pdfModal').classList.remove('open');
  document.getElementById('pdfFrame')?.remove();
}

// ── MODE SWITCHING ────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeMCQ').classList.toggle('active', mode === 'mcq');
  document.getElementById('modeOpen').classList.toggle('active', mode === 'open');
  initSplash();
}

// ── OPEN QUIZ ─────────────────────────────────────────
function buildOpenFlat(chapters, limit) {
  const flat = [];
  chapters.forEach(ch => {
    shuffle(ch.questions).forEach(q => {
      flat.push({ ...q, chapterName: ch.name, chapterColor: ch.color, pages: q.pages || [] });
    });
  });
  if (limit && limit < flat.length) return shuffle(flat).slice(0, limit);
  return flat;
}

function renderOpenQuiz() {
  const total = flatQuestions.length;
  const marked = Object.values(answers).filter(a => a.correct !== null).length;
  const correct = Object.values(answers).filter(a => a.correct === true).length;
  const chName = currentChapterId === 'all' ? 'Vse skupaj' : activeChapters[0]?.name || '';
  document.getElementById('quizChapterName').textContent = chName;
  document.getElementById('quizProgressText').textContent = `${marked} / ${total} ocenjenih`;
  document.getElementById('progressFill').style.width = `${(marked/total)*100}%`;
  document.getElementById('scoreDisplay').textContent = `✓ ${correct} / ${marked}`;

  const body = document.getElementById('quizBody');
  body.innerHTML = '';
  flatQuestions.forEach((q, qi) => {
    const ans = answers[qi];
    const block = document.createElement('div');
    block.className = 'q-block' + (ans && ans.correct === true ? ' open-correct' : ans && ans.correct === false ? ' open-wrong' : '');
    block.id = `q${qi}`;
    const statusClass = ans ? (ans.correct === true ? 'correct' : ans.correct === false ? 'wrong' : '') : '';
    block.innerHTML = `
      <div class="q-meta">
        <span class="q-number"># ${String(qi+1).padStart(2,'0')}</span>
        <span style="font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace;flex:1">${q.chapterName}</span>
        <button class="info-btn ${ans ? 'visible' : ''}" id="infobtn${qi}" onclick="openPdfModal(${qi})">ℹ vir</button>
        <span class="q-status ${statusClass}"></span>
      </div>
      <div class="q-text">${q.q}</div>
      <div id="revealWrap${qi}" ${ans ? 'style="display:none"' : ''}>
        <button class="btn-reveal" onclick="revealAnswer(${qi})">Prikaži odgovor</button>
      </div>
      <div class="open-answer-wrap" id="answerWrap${qi}" ${!ans ? 'style="display:none"' : ''}>
        <div class="open-answer-box">${q.answer}</div>
        <div class="open-mark-btns">
          <button class="btn-mark-correct" onclick="markAnswer(${qi}, true)" ${ans && ans.correct !== null ? 'disabled' : ''}>✓ Pravilno</button>
          <button class="btn-mark-wrong" onclick="markAnswer(${qi}, false)" ${ans && ans.correct !== null ? 'disabled' : ''}>✗ Napačno</button>
        </div>
      </div>`;
    body.appendChild(block);
  });
}

function revealAnswer(qi) {
  if (answers[qi]) return;
  answers[qi] = { revealed: true, correct: null };
  document.getElementById(`revealWrap${qi}`).style.display = 'none';
  document.getElementById(`answerWrap${qi}`).style.display = 'block';
  const infoBtn = document.getElementById(`infobtn${qi}`);
  if (infoBtn) infoBtn.classList.add('visible');
}

function markAnswer(qi, isCorrect) {
  if (!answers[qi] || answers[qi].correct !== null) return;
  answers[qi].correct = isCorrect;
  const block = document.getElementById(`q${qi}`);
  if (block) {
    block.classList.toggle('open-correct', isCorrect);
    block.classList.toggle('open-wrong', !isCorrect);
  }
  const dot = document.querySelector(`#q${qi} .q-status`);
  if (dot) { dot.classList.add(isCorrect ? 'correct' : 'wrong'); }
  block.querySelectorAll('.btn-mark-correct, .btn-mark-wrong').forEach(b => b.disabled = true);
  const total = flatQuestions.length;
  const marked = Object.values(answers).filter(a => a.correct !== null).length;
  const correct = Object.values(answers).filter(a => a.correct === true).length;
  document.getElementById('quizProgressText').textContent = `${marked} / ${total} ocenjenih`;
  document.getElementById('progressFill').style.width = `${(marked/total)*100}%`;
  document.getElementById('scoreDisplay').textContent = `✓ ${correct} / ${marked}`;
  if (marked === total) setTimeout(showResults, 600);
}

// ── INIT ───────────────────────────────────────────────
initSplash();
</script>
